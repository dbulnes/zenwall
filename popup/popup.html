<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Zenwall</h1>
    <p id="status">Loading...</p>

    <!-- Timer status for current site (shown when active) -->
    <div id="timer-status" class="timer-status hidden">
      <div class="timer-domain" id="timer-domain"></div>
      <div class="timer-bar-track">
        <div class="timer-bar-fill" id="timer-bar-fill"></div>
      </div>
      <div class="timer-remaining" id="timer-remaining"></div>
    </div>

    <!-- Block current site -->
    <div id="block-section">
      <button id="block-btn" class="block-btn">Block this site</button>
    </div>

    <!-- Choice dialog (hidden by default) -->
    <div id="choice-dialog" class="choice-dialog hidden">
      <p class="choice-label">What do you want to do?</p>
      <button id="block-domain" class="choice-btn"></button>
      <button id="block-url" class="choice-btn choice-btn-secondary"></button>
      <button id="timer-domain-btn" class="choice-btn choice-btn-timer"></button>
      <button id="choice-cancel" class="choice-cancel">Cancel</button>
    </div>

    <!-- Timer input (hidden by default) -->
    <div id="timer-setup" class="timer-setup hidden">
      <p class="choice-label">Daily time limit for <strong id="timer-setup-domain"></strong></p>
      <div class="timer-setup-row">
        <input type="number" id="timer-setup-minutes" min="1" max="480" value="30">
        <span class="timer-setup-unit">minutes/day</span>
      </div>
      <div class="timer-setup-actions">
        <button id="timer-setup-confirm" class="choice-btn">Set limit</button>
        <button id="timer-setup-cancel" class="choice-cancel">Cancel</button>
      </div>
    </div>

    <!-- Confirmation (hidden by default) -->
    <div id="confirm-msg" class="confirm-msg hidden"></div>

    <!-- Stats -->
    <div id="stats-section" class="stats-section">
      <div class="stats-header">Stats</div>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="total-blocks">0</span>
          <span class="stat-label">Total blocks</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="top-domain">-</span>
          <span class="stat-label" id="top-domain-label">Top blocked</span>
        </div>
      </div>
      <div id="domain-bars" class="domain-bars"></div>
    </div>

    <a href="#" id="settings-link">Manage blocked sites &rarr;</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
